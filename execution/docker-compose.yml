services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: leadbot
      POSTGRES_USER: leadbot
      POSTGRES_PASSWORD: leadbot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  bot:
    build:
      context: ..
      dockerfile: execution/Dockerfile
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pg_data:
